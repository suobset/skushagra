<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="terminal" data-crt="off" data-transparency="normal" data-vim="off">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <script>
    (function () {
      var root = document.documentElement;
      function read(key) {
        try {
          return localStorage.getItem(key);
        } catch (error) {
          return null;
        }
      }
      var theme = read("site-theme");
      if (!theme) {
        theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "news" : "terminal";
      }
      root.setAttribute("data-theme", ["terminal", "news", "swiss", "glass"].indexOf(theme) > -1 ? theme : "terminal");
      root.setAttribute("data-vim", read("site-vim") === "on" ? "on" : "off");
      root.setAttribute("data-transparency", read("site-glass-reduce-transparency") === "on" ? "reduced" : "normal");
      var crtPref = read("site-crt") === "on";
      var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      root.setAttribute("data-crt", crtPref && !reducedMotion ? "on" : "off");
      var variants = ["aurora", "violet", "nebula", "iris", "dusk"];
      var seed = read("site-glass-bg-seed");
      if (!seed) {
        seed = String(Date.now());
        try {
          localStorage.setItem("site-glass-bg-seed", seed);
        } catch (error) {
          seed = "0";
        }
      }
      var hash = 0;
      for (var i = 0; i < seed.length; i += 1) {
        hash = (hash * 31 + seed.charCodeAt(i)) % 2147483647;
      }
      root.setAttribute("data-glass-bg", variants[Math.abs(hash) % variants.length]);
    })();
  </script>
  <link rel="stylesheet" href="{{ "css/tokens.css" | relURL }}?v={{ now.Unix }}">
  <link rel="stylesheet" href="{{ "css/classic-mac.css" | relURL }}?v={{ now.Unix }}">
  <script src="{{ "js/site-settings.js" | relURL }}?v={{ now.Unix }}" defer></script>
  {{- block "head" . }}{{- end }}
</head>
