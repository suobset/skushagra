{{ define "main" }}
{{ partial "header" . }}

<hr class="divider">

<section>
  <h1 class="section-title">{{ .Title }}<span class="cursor"></span></h1>
  
  {{ with .Content }}
  <div class="post-content" style="margin-bottom: 24px;">
    {{ . }}
  </div>
  {{ end }}
  
  <ul class="post-list">
    {{ range .Pages }}
    {{ partial "post-list-item.html" . }}
    {{ end }}
  </ul>
</section>
{{ end }}
