<li class="post-item">
  <span class="post-date">{{ .Date.Format "Jan 02, 2006" }}</span>
  <div class="post-main">
    {{ $thumb := or .Params.thumbnail (or .Params.featured_image .Params.image) }}
    {{ with $thumb }}
    <img class="post-thumb" src="{{ . | relURL }}" alt="" loading="lazy" decoding="async">
    {{ end }}
    <a href="{{ $.Permalink }}" class="post-link">{{ $.Title }}</a>
    {{ with $.Params.tags }}
    <div class="post-tags" aria-label="Tags">
      {{ range first 3 . }}
      <span class="tag-chip">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}
    <p class="post-excerpt">{{ $.Summary | plainify | truncate 120 }}</p>
  </div>
</li>
